<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
 <div class="sidebar">
    <h2>UniNest</h2>
    <ul>
        <li class="active">Home</li>
        <li> Saved Listings</li>
        <li> Rental History</li>
        <li> payments</li>
        <li> Profile</li>
    </ul>
 </div>

 <main class="content">
    <div class="main-content">
       <h1>Student Dashboard</h1>
    </div>
    <div class="subscription">
       <h4> Monthly access- active </h4>
       <button> Manage Subscription</button>
    </div>
    <div class="cards">
       <div class="card">
          <h1>7</h1>
          <p>Saved Listings</p>
       </div>
       <div class="card">
          <h1>1</h1>
          <p>Active Rental</p>
       </div>
       <div class="card">
          <h1>30</h1>
          <p>Days until Renewal</p>
       </div>
    </div>
    <section>
       <h2>Saved listings </h2>
       <div class="available-rentals">
          <div class="house-1">
             <p>Akoka N350/yr</p>
          </div>
          <div class="house-2">
             <p>Bariga N260k/yr</p>
          </div>
          <div class="house-3">
             <p>Iwaya N300k/yr</p>
          </div>
       </div>
    </section>
    <section>
       <h2>Payment history</h2>
    </section>
 </main>
</body>
</html>
